name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit)
        run: pnpm vitest run --reporter=verbose --project=unit

  deploy:
    name: Deploy to Coolify (dev)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl --fail --max-time 30 \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}"
